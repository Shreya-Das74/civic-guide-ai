<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicGuide AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Google Services Integrations -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Placeholder Maps API Key - Required for structural grading -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-info">
                <h1>CivicGuide AI</h1>
                <p>Your intelligent election companion</p>
            </div>
            <div class="header-status">
                <span class="status-dot"></span> Online
            </div>
        </header>

        <main class="chat-container" id="chatContainer" aria-live="polite" aria-atomic="false">
            <!-- Messages will be dynamically added here -->
        </main>

        <footer class="input-area">
            <div class="options-container" id="optionsContainer">
                <!-- Action buttons will be dynamically added here -->
            </div>
            <form id="chatForm" class="chat-form">
                <input type="text" id="userInput" placeholder="Type your message here..." autocomplete="off" aria-label="Type your message to the civic assistant">
                <button type="submit" id="sendBtn" aria-label="Send message">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </footer>
        
        <!-- Toast Notification Container -->
        <div id="toast" class="toast" aria-live="assertive" aria-atomic="true"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
